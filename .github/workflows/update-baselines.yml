name: Update Screenshot Baselines

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to store baselines under (e.g. v0.0.4)'
        required: true

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Download WireMock JAR
        run: |
          WIREMOCK_VERSION="${{ vars.WIREMOCK_VERSION || '3.10.0' }}"
          curl -fsSL -o .wiremock/wiremock-standalone.jar \
            "https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/${WIREMOCK_VERSION}/wiremock-standalone-${WIREMOCK_VERSION}.jar"

      - name: Generate baselines
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAGICK: magick
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        with:
          api-level: 31
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: .maestro/screenshot_test.sh --update-baselines

      - name: Upload baselines to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync .maestro/screenshots/baselines/ \
            "s3://${{ secrets.R2_BUCKET_NAME }}/${{ github.event.inputs.version }}/" \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}" \
            --delete

      - name: Upload baselines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: baselines-${{ github.event.inputs.version }}
          path: .maestro/screenshots/baselines/

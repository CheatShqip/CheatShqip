name: Update Screenshot Baselines

env:
  BASELINES_DIR_PATH: .maestro/generated/baselines

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to store baselines under (e.g. v0.0.4)'
        required: true

jobs:
  update-baselines:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Download WireMock JAR
        run: |
          WIREMOCK_VERSION="${{ vars.WIREMOCK_VERSION || '3.10.0' }}"
          curl -fsSL -o .wiremock/wiremock-standalone.jar \
            "https://repo1.maven.org/maven2/org/wiremock/wiremock-standalone/${WIREMOCK_VERSION}/wiremock-standalone-${WIREMOCK_VERSION}.jar"

      - name: Generate baselines
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 120000
        with:
          api-level: 36
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: .maestro/screenshot_test.sh --update-baselines

      - name: Upload baselines to R2
        uses: ./.github/actions/upload-to-r2
        with:
          local-path: ${{ env.BASELINES_DIR_PATH }}/
          r2-path: ${{ github.event.inputs.version }}
          access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          bucket-name: ${{ secrets.R2_BUCKET_NAME }}
          endpoint-url: ${{ secrets.R2_ENDPOINT_URL }}
          delete: 'true'
